server:  
  port: 8484
  tomcat:
    max-part-count: 20

spring:
  application-name: legal

  # Oracle DB
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@192.168.0.21:1521/xe
    username: legal
    password: ${DB_PASSWORD:1234}
    
  # Jpa Setting
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
    show-sql: true
    hibernate:
      ddl-auto: update

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 200MB
      file-size-threshold: 2KB
 
  # View Resolver & Static (Fixed Indentation)
  web:
    resources:
      static-locations: classpath:/static/
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  # gmail SMPT
  mail:
    host: smtp.gmail.com
    port: 587
    username: legalriskai
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true
      
logging.level:
  org.hibernate.SQL: debug 

com.oracle.legal.upload.path: upload
