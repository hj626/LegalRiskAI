# Ai_boon Docker Compose
# 분쟁 유형 분류 AI 서버 단독 실행

version: '3.8'

services:
  ai-boonjang:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal-ai-boonjang
    ports:
      - "8001:8001"
    volumes:

      - ./saved_models:/app/saved_models:ro
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# 네트워크 (자동 생성)
# 다른 AI 서비스와 연결하려면 아래 주석 해제
# networks:
#   default:
#     name: legal-ai-network
#     external: true
